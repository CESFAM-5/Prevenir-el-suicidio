<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Menú Prevención</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }

  html, body {
    width:100%; height:100%;
    background:#e8f0fc;
    overflow:hidden;
  }

  .stage {
    width:100%;
    height:100dvh;
    display:flex;
    justify-content:center;
    align-items:center;
    position:relative;
  }

  /* La imagen es 1080x1920 (ratio 9:16).
     img-wrap replica exactamente el área visible de la imagen
     para que los hotspots en % calcen perfectamente. */
  .img-wrap {
    position:relative;
    width:  min(100vw, calc(100dvh * 9 / 16));
    height: min(100dvh, calc(100vw * 16 / 9));
    flex-shrink:0;
  }

  .img-wrap img {
    width:100%;
    height:100%;
    object-fit:contain;
    display:block;
    pointer-events:none;
  }

  .hotspot {
    position:absolute;
    display:block;
    background:transparent;
    z-index:10;
    -webkit-tap-highlight-color:transparent;
    border-radius:14px;
  }
</style>
</head>
<body>
<div class="stage">
  <div class="img-wrap">
    <img src="./portada.png" alt="Prevención y cuidado">

    <!-- ROJO -->
    <a href="./rojo.html" class="hotspot"
       style="left:12.7%;top:33.5%;width:75%;height:17.24%;"
       aria-label="Zona Roja"></a>

    <!-- AMARILLO -->
    <a href="./amarillo.html" class="hotspot"
       style="left:13.7%;top:53.07%;width:73%;height:16.93%;"
       aria-label="Zona Amarilla"></a>

    <!-- VERDE -->
    <a href="./verde.html" class="hotspot"
       style="left:13.7%;top:72.92%;width:72%;height:16%;"
       aria-label="Zona Verde"></a>

    <!-- GUÍA -->
    <a href="https://sites.google.com/view/guiadeautoconsulta/guiaautoconsulta"
       class="hotspot"
       style="left:65.9%;top:93.1%;width:10.8%;height:6.05%;border-radius:999px;"
       aria-label="Guía de AutoConsulta"></a>

    <!-- WHATSAPP -->
    <a href="https://api.whatsapp.com/send?text=https://cesfam-5.github.io/Prevenir-el-suicidio/"
       target="_blank" rel="noopener noreferrer"
       class="hotspot"
       style="left:86.1%;top:93.1%;width:10.8%;height:6.05%;border-radius:999px;"
       aria-label="Compartir por WhatsApp"></a>
  </div>
</div>
</body>
</html>
