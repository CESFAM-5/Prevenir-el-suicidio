<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Menú Prevención</title>

<style>
html, body { margin:0; padding:0; height:100%; overflow:hidden; background:#e8f0fc; }
* { scrollbar-width:none; box-sizing:border-box; }
*::-webkit-scrollbar { width:0; height:0; }

.w {
  max-width:1080px;
  margin:0 auto;
  height:100dvh;
  display:flex;
  justify-content:center;
  align-items:flex-start;
  overflow:hidden;
}

.stage {
  position:relative;
  width:100%;
  height:100dvh;
  overflow:hidden;
}

.frame {
  position:absolute;
  inset:0;
  display:flex;
  align-items:flex-start;
}

.hotspot {
  position:absolute;
  display:block;
  background:transparent;
  z-index:10;
  -webkit-tap-highlight-color: transparent;
}

.img-wrap {
  position:relative;
  width:100%;
  height:100dvh;
}
</style>
</head>

<body>
<div class="w">
  <div class="stage">
    <div class="frame">
      <div class="img-wrap">
      <img src="https://i.imgur.com/XQrEdEG.png"
           alt="Prevención y cuidado"
           style="width:100%;height:100dvh;object-fit:cover;object-position:top;pointer-events:none;display:block;">

      <!-- ROJO -->
      <a href="./rojo.html"
         class="hotspot"
         style="left:12.7%;top:33.5%;width:85.19%;height:17.24%;border-radius:14px;"
         aria-label="Zona Roja"></a>

      <!-- AMARILLO -->
      <a href="./amarillo.html"
         class="hotspot"
         style="left:13.7%;top:53.07%;width:83.43%;height:16.93%;border-radius:14px;"
         aria-label="Zona Amarilla"></a>

      <!-- VERDE -->
      <a href="./verde.html"
         class="hotspot"
         style="left:13.7%;top:72.92%;width:82.59%;height:16.00%;border-radius:14px;"
         aria-label="Zona Verde"></a>

      <!-- GUÍA -->
      <a href="https://sites.google.com/view/guiadeautoconsulta/guiaautoconsulta"
         class="hotspot"
         style="left:65.9%;top:93.1%;width:10.8%;height:6.05%;border-radius:999px;"
         aria-label="Guía de AutoConsulta"></a>

      <!-- WHATSAPP -->
      <a href="https://api.whatsapp.com/send?text=https://sites.google.com/view/prevenirelsuicidio/inicio"
         target="_blank" rel="noopener noreferrer"
         class="hotspot"
         style="left:86.1%;top:93.1%;width:10.8%;height:6.05%;border-radius:999px;"
         aria-label="Compartir por WhatsApp"></a>
      </div>
    </div>
  </div>
</div>
</body>
</html>
