<!DOCTYPE html>
<html lang="es">
<head>

  <title>Guías y Mapas</title>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background-color: #f0f7ee;
      font-family: 'Open Sans', Arial, sans-serif;
    }

    .page-container {
      width: 100%;
      max-width: 600px;
      margin: 0 auto;
      padding: 20px 15px 40px;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: #27ae60;
      text-decoration: none;
      font-weight: 600;
      margin-bottom: 20px;
    }

    .back-link:hover { opacity: 0.75; }

    h3 {
      text-align: center;
      color: #003366;
      margin-bottom: 16px;
      font-size: 17px;
    }

    p.intro {
      text-align: center;
      margin-bottom: 24px;
      font-size: 14px;
      color: #5d6d7e;
      line-height: 1.5;
    }

    .link-row {
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      text-decoration: none;
      color: black;
      font-weight: bold;
      font-size: 14px;
      transition: opacity 0.15s;
    }

    .link-row:hover { opacity: 0.85; }
    .link-row span { margin-right: 8px; flex-shrink: 0; }
  </style>
</head>
<body>
  <div class="page-container">
